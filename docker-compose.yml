version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine # postgres image
    container_name: meshpay-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-meshpay}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-meshpay_db}
      POSTGRES_MAX_CONNECTIONS: 100
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meshpay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-meshpay}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (for distributed idempotency)
  redis:
    image: redis:7-alpine # redis image
    container_name: meshpay-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - meshpay-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MeshPay Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meshpay-app
    image: meshpay:latest
    environment:
      # Database
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-meshpay_db}
      DB_USER: ${DB_USER:-meshpay}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_POOL_SIZE: 20
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL: update  # validate in production
      
      # Redis
      REDIS_ENABLED: 'true'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      
      # Security
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${OAUTH2_ISSUER_URI:-}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${OAUTH2_PROVIDER_JWKS_URI:-}
      
      # Spring
      SPRING_PROFILES_ACTIVE: production
      ENVIRONMENT: docker
      
      # Logging
      LOGGING_LEVEL_COM_DEMO_MESHPAY: INFO
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meshpay-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

networks:
  meshpay-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
