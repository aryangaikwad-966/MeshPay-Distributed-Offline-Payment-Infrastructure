# Test Profile Configuration
# Used during Maven test execution and integration tests

# ===== DATABASE: H2 for testing =====
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===== REDIS: Disabled for testing (in-memory fallback) =====
spring.redis.enabled=false
management.health.redis.enabled=false
management.endpoints.web.exposure.include=health,metrics,info,prometheus


# ===== LOGGING: Verbose for debugging =====
logging.level.root=WARN
logging.level.com.demo.upimesh=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# ===== UPI MESH =====
upi.mesh.idempotency-ttl-seconds=3600
upi.mesh.packet-max-age-seconds=3600

# ===== SECURITY: Disabled for easier testing =====
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=

# ===== TEST USER =====
spring.security.user.name=testuser
spring.security.user.password=testpass
spring.security.user.roles=USER,BRIDGE_NODE,ADMIN
