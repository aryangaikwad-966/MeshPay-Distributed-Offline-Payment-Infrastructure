# ========================================================================
# MESHPAY - PRODUCTION CONFIGURATION
# ========================================================================

# ===== SERVER =====
server.port=8080
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.tomcat.max-http-post-size=1MB
server.tomcat.max-http-request-header-size=8KB
server.tomcat.max-connections=200
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10

# ===== SSL/TLS (HTTPS) =====
server.ssl.enabled=false

# ===== SERVER FORCED REDIRECT (HTTP → HTTPS) =====
server.error.include-message=never
server.error.include-stacktrace=never

# ===== DATABASE: PostgreSQL (PRIMARY) =====
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.url=${DB_URL:jdbc:h2:mem:meshpay}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# Connection pooling (HikariCP)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=5

# ===== REDIS (Distributed Caching & Idempotency) =====
spring.redis.enabled=${REDIS_ENABLED:false}
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.database=${REDIS_DB:0}

# ===== SECURITY: OAuth2 JWT =====
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OAUTH2_ISSUER_URI:}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OAUTH2_PROVIDER_JWKS_URI:}

# ===== LOGGING =====
logging.level.root=WARN
logging.level.com.demo.upimesh=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/meshpay.log

# ===== ACTUATOR ENDPOINTS (Health & Metrics) =====
management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ===== THYMELEAF (Dashboard UI) =====
spring.thymeleaf.enabled=true

# ===== H2 CONSOLE (Development Only) =====
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
# H2_CONSOLE_ENABLED=false


# ===== JACKSON JSON =====
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== MESHPAY APPLICATION PROPERTIES =====
upi.mesh.idempotency-ttl-seconds=${UPI_IDEMPOTENCY_TTL:3600}
upi.mesh.packet-max-age-seconds=${UPI_PACKET_MAX_AGE:3600}
upi.mesh.packet-max-future-seconds=300

# KMS Configuration (AWS)
aws.kms.enabled=${AWS_KMS_ENABLED:false}
aws.kms.region=${AWS_REGION:us-east-1}

# ===== CORS CONFIGURATION =====
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===== ENVIRONMENT =====
environment=${ENVIRONMENT:development}
application.version=@project.version@
